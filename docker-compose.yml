version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: messenger-postgres
    environment:
      POSTGRES_DB: messenger_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: messenger-backend
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/messenger_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: super-secret-key-2026-messenger-change-this-in-production-1234567890
      JWT_EXPIRATION: 86400000
    depends_on:
      - postgres
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: dockerfile
    container_name: messenger-web
    ports:
      - "3000:3000"
    environment:
      # Trong Docker network, web container gọi backend qua tên service
      # Nhưng browser gọi từ máy host → phải dùng localhost
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

